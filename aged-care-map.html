<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aged Care Facilities</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2137;--navy-mid:#163252;
  --teal:#1a8c7a;--teal-l:#22b89e;
  --gold:#e8a642;--amber:#d4870a;
  --red:#e85a4f;--cream:#f5f0e8;--muted:#6b7c93;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--navy);overflow:hidden}

header{position:fixed;top:0;left:0;right:0;z-index:1100;height:60px;
  display:flex;align-items:center;gap:12px;padding:0 18px;
  background:var(--navy);border-bottom:1px solid rgba(255,255,255,0.08);
  box-shadow:0 2px 20px rgba(0,0,0,0.4)}
.logo{width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--teal),var(--teal-l));
  display:flex;align-items:center;justify-content:center;font-size:18px}
.hd-text h1{color:var(--cream);font-size:1rem;font-weight:700}
.hd-text p{color:var(--muted);font-size:0.68rem;margin-top:1px}
.hd-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.badge{background:rgba(26,140,122,0.18);color:var(--teal-l);
  border:1px solid rgba(26,140,122,0.35);font-size:0.63rem;font-weight:700;
  letter-spacing:0.07em;padding:3px 9px;border-radius:20px;text-transform:uppercase}
.hd-count{color:var(--cream);font-size:0.7rem;
  background:rgba(255,255,255,0.07);border-radius:20px;padding:3px 10px}

/* Vehicle status indicator in header */
.vehicle-status{display:flex;align-items:center;gap:6px;
  color:var(--cream);font-size:0.7rem;
  background:rgba(255,255,255,0.07);border-radius:20px;padding:3px 10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0}
.status-dot.live{background:#4caf50;box-shadow:0 0 6px #4caf50}
.status-dot.error{background:var(--red)}

#sidebar{position:fixed;top:60px;left:0;bottom:0;width:265px;z-index:1000;
  background:var(--navy);border-right:1px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column}
.sb-search{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sb-search input{width:100%;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);border-radius:8px;
  color:var(--cream);font-size:0.75rem;padding:7px 10px;
  outline:none;font-family:inherit}
.sb-search input::placeholder{color:var(--muted)}
.sb-search input:focus{border-color:var(--teal)}
.sb-label{padding:8px 13px 4px;font-size:0.6rem;font-weight:700;
  letter-spacing:0.1em;color:var(--muted);text-transform:uppercase}
.fac-list{flex:1;overflow-y:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.fac-list::-webkit-scrollbar{width:3px}
.fac-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.fac-row{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;cursor:pointer;
  border-left:3px solid transparent;transition:background 0.15s,border-color 0.15s;
  -webkit-tap-highlight-color:transparent}
.fac-row:active,.fac-row.active{background:rgba(26,140,122,0.16);border-left-color:var(--teal-l)}
.fac-row.hidden{display:none}
.code-pill{font-size:0.63rem;font-weight:800;padding:3px 6px;border-radius:6px;
  flex-shrink:0;margin-top:2px;min-width:32px;text-align:center;
  background:rgba(26,140,122,0.2);color:var(--teal-l);
  border:1px solid rgba(34,184,158,0.25)}
.fac-info{flex:1;min-width:0}
.fac-name{color:var(--cream);font-size:0.75rem;font-weight:600;line-height:1.3}
.fac-addr{color:var(--muted);font-size:0.63rem;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fac-beds{color:var(--muted);font-size:0.62rem;margin-top:2px}
.sb-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.07);
  font-size:0.63rem;color:var(--muted);line-height:1.6}
.sb-footer strong{color:var(--gold)}

/* Vehicle section in sidebar */
.sb-vehicle-section{padding:8px 12px;border-top:1px solid rgba(255,255,255,0.07)}
.sb-vehicle-lbl{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;
  color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.vehicle-card{background:rgba(255,255,255,0.06);border-radius:8px;
  padding:8px 10px;border:1px solid rgba(255,255,255,0.08)}
.vehicle-name{color:var(--cream);font-size:0.75rem;font-weight:600}
.vehicle-info{color:var(--muted);font-size:0.65rem;margin-top:3px}
.vehicle-speed{color:var(--teal-l);font-size:0.65rem;margin-top:2px}

#map{position:fixed;top:60px;left:265px;right:0;bottom:0;z-index:1}

/* Popup */
.leaflet-popup-content-wrapper{
  border-radius:14px!important;padding:0!important;
  box-shadow:0 12px 48px rgba(0,0,0,0.3)!important;
  border:none!important;overflow:hidden;min-width:290px;max-width:330px}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-tip-container{display:none!important}
.leaflet-popup-close-button{
  color:rgba(255,255,255,0.7)!important;font-size:20px!important;
  top:8px!important;right:10px!important;z-index:10;padding:0!important;
  width:auto!important;height:auto!important}
.leaflet-popup-close-button:hover{color:#fff!important}

.pw-head{background:linear-gradient(135deg,var(--navy),var(--navy-mid));
  padding:14px 16px 12px;display:flex;gap:10px;align-items:flex-start}
.pw-code{background:var(--teal);color:#fff;font-size:0.66rem;font-weight:800;
  letter-spacing:0.07em;padding:3px 7px;border-radius:6px;flex-shrink:0;margin-top:2px}
.pw-name{color:var(--cream);font-size:0.88rem;font-weight:700;line-height:1.3;padding-right:20px}
.pw-addr{color:var(--muted);font-size:0.68rem;margin-top:3px}
.pw-phone{color:var(--teal-l);font-size:0.68rem;margin-top:2px}
.pw-body{background:#fff;padding:13px 16px 15px}
.pw-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}
.pw-stat{background:#f5f0e8;border-radius:8px;padding:8px 9px}
.pw-stat-lbl{font-size:0.56rem;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:#8898aa;margin-bottom:3px}
.pw-stat-val{font-size:1.15rem;font-weight:800;color:var(--navy);line-height:1}
.pw-stat-val.warn{color:var(--red)}
.pw-stat-val.caution{color:var(--amber)}
.pw-stat-val.ok{color:var(--teal)}
.pw-div{height:1px;background:#eee;margin:10px 0}
.pw-notes-lbl{font-size:0.56rem;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:#8898aa;margin-bottom:6px}
.pw-note{font-size:0.73rem;color:#444;line-height:1.5;
  border-radius:0 7px 7px 0;padding:7px 10px;margin-bottom:5px;
  border-left:3px solid var(--gold);background:#fffbf2}
.pw-note:last-child{margin-bottom:0}
.pw-note.info{border-color:var(--teal);background:#eef8f6}
.pw-note.alert{border-color:var(--red);background:#fff0ef}

.pw-btn-row{margin-top:12px}
.pw-btn{display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:10px 14px;border-radius:9px;border:none;
  background:linear-gradient(135deg,#1a8c7a,#22b89e);
  color:#fff;font-size:0.78rem;font-weight:700;letter-spacing:0.03em;
  cursor:pointer;text-decoration:none;
  box-shadow:0 4px 14px rgba(26,140,122,0.35);
  -webkit-tap-highlight-color:transparent;transition:opacity 0.15s}
.pw-btn:hover,.pw-btn:active{opacity:0.88}
.pw-btn-icon{font-size:1rem}

/* Marker - facility */
.cpin{width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.58rem;font-weight:800;letter-spacing:0.02em;
  color:#fff;border:3px solid var(--teal);background:var(--navy);
  box-shadow:0 4px 14px rgba(13,33,55,0.5),0 0 0 4px rgba(34,184,158,0.2);
  cursor:pointer;text-align:center;line-height:1.1;
  -webkit-tap-highlight-color:transparent}
.cpin.hi{border-color:var(--red);background:#a02820;
  box-shadow:0 4px 14px rgba(232,90,79,0.5),0 0 0 4px rgba(232,90,79,0.2)}
.cpin.mid{border-color:var(--amber);background:#8c5c08;
  box-shadow:0 4px 14px rgba(232,166,66,0.5),0 0 0 4px rgba(232,166,66,0.2)}

/* Vehicle marker */
.vpin{width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  border:3px solid #4caf50;background:#1a3a1a;
  box-shadow:0 4px 14px rgba(76,175,80,0.5),0 0 0 4px rgba(76,175,80,0.2);
  cursor:pointer;animation:pulse 2s infinite}
@keyframes pulse{
  0%{box-shadow:0 4px 14px rgba(76,175,80,0.5),0 0 0 4px rgba(76,175,80,0.2)}
  50%{box-shadow:0 4px 14px rgba(76,175,80,0.8),0 0 0 8px rgba(76,175,80,0.1)}
  100%{box-shadow:0 4px 14px rgba(76,175,80,0.5),0 0 0 4px rgba(76,175,80,0.2)}}

/* Legend */
.map-legend{
  background:rgba(13,33,55,0.88)!important;
  border:1px solid rgba(255,255,255,0.1)!important;
  border-radius:11px!important;padding:11px 13px!important;
  color:var(--cream)!important;font-size:0.67rem!important;
  line-height:1.4;box-shadow:none!important}
.leg-title{font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  font-size:0.58rem;color:var(--muted);margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:10px;height:10px;border-radius:50%;border:2px solid;flex-shrink:0}
.leg-dot.g{border-color:#22b89e;background:rgba(34,184,158,0.3)}
.leg-dot.a{border-color:#e8a642;background:rgba(232,166,66,0.3)}
.leg-dot.r{border-color:#e85a4f;background:rgba(232,90,79,0.3)}
.leg-dot.v{border-color:#4caf50;background:rgba(76,175,80,0.3)}
</style>
</head>
<body>

<header>
  <div class="logo">🏥</div>
  <div class="hd-text">
    <h1>Aged Care Facility Map</h1>
    <p>Frankston &amp; Mornington Peninsula Region</p>
  </div>
  <div class="hd-right">
    <span class="badge">Live Dashboard</span>
    <div class="vehicle-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Vehicle: Off</span>
    </div>
    <span class="hd-count">9 sites</span>
  </div>
</header>

<div id="sidebar">
  <div class="sb-search">
    <input type="text" id="searchBox" placeholder="🔍  Search facility or code…">
  </div>
  <div class="sb-label">Facility Directory</div>
  <div class="fac-list" id="facList"></div>

  <!-- Vehicle info panel -->
  <div class="sb-vehicle-section" id="vehiclePanel" style="display:none">
    <div class="sb-vehicle-lbl">🚗 Live Vehicle</div>
    <div class="vehicle-card">
      <div class="vehicle-name" id="vName">—</div>
      <div class="vehicle-info" id="vInfo">Locating…</div>
      <div class="vehicle-speed" id="vSpeed"></div>
    </div>
  </div>

  <div class="sb-footer">
    <strong>Tap</strong> a pin to view details &amp; open incidents.<br>
    🚗 Live vehicle tracking via Fleetlog.<br>
    📊 Links to Dispatch_Incident_Tracker.xlsx
  </div>
</div>

<div id="map"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   FLEETLOG API CREDENTIALS
   ── Replace the placeholder values below on GitHub ──
   DO NOT share these credentials publicly.
   ═══════════════════════════════════════════════════════════ */
const FLEETLOG_CLIENT_ID     = "PASTE_YOUR_CLIENT_ID_HERE";
const FLEETLOG_CLIENT_SECRET = "PASTE_YOUR_CLIENT_SECRET_HERE";
const FLEETLOG_VEHICLE_ID    = "PASTE_YOUR_VEHICLE_ID_HERE";
// API base URL — confirm with Fleetlog support
const FLEETLOG_API_BASE      = "https://api.fleetlog.com.au/v2";
// How often to refresh vehicle position (milliseconds) — 10000 = 10 seconds
const REFRESH_INTERVAL       = 10000;
/* ═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   SHAREPOINT LINK
   ═══════════════════════════════════════════════════════════ */
const SP_BASE = "https://gunnmcconville.sharepoint.com/:x:/s/GMDispatchCranbourne-ManagementSystem/IQAvXioEJaLXQoCtLoejRMxnAVZc-cb7KlxLpVSodiOWGXE?e=2epmet";
function sheetLink(tab){ return SP_BASE + "&activeSheet=" + encodeURIComponent(tab); }

/* ═══════════════════ FACILITY DATA ═══════════════════ */
const facilities = [
  {code:"AV",name:"MiCare Avondrust Village",suburb:"Carrum Downs VIC 3201",address:"1105 Frankston-Dandenong Rd",phone:"(03) 9788 9020",lat:-38.0853,lng:145.1267,beds:72,incidents:4,
   comments:[{type:"info",text:"70 residential rooms + 2 respite beds. Three-storey facility."},{type:"general",text:"Eden Alternative™ — pets, plants and children welcome."}]},
  {code:"BP",name:"Bayside Hostel",suburb:"Mordialloc VIC 3195",address:"5 McDonald Street",phone:"(03) 8543 3100",lat:-38.0002,lng:145.0876,beds:40,incidents:2,
   comments:[{type:"info",text:"Specialist dementia facility — all staff trained in empowerment strategies."},{type:"general",text:"7-day lifestyle program. Small, welcoming environment."}]},
  {code:"CW",name:"Corowa Court",suburb:"Mornington VIC 3931",address:"752 Esplanade",phone:"(03) 5975 9633",lat:-38.2285,lng:145.0395,beds:60,incidents:3,
   comments:[{type:"info",text:"Benetas facility. Captivating Port Phillip Bay views."},{type:"general",text:"Clustered housing — 4 interconnected homes with own living areas."}]},
  {code:"FR",name:"Vasey RSL Care Frankston",suburb:"Frankston South VIC 3199",address:"85 Overport Rd",phone:"(03) 9787 2844",lat:-38.1742,lng:145.1267,beds:120,incidents:7,
   comments:[{type:"info",text:"120-bed home supporting veterans, war widows & all Australians."},{type:"alert",text:"Accreditation renewal due — check compliance calendar."}]},
  {code:"PT",name:"St Paul's Terrace",suburb:"Frankston VIC 3199",address:"2B Towerhill Road",phone:"(03) 8781 6000",lat:-38.1610,lng:145.1198,beds:80,incidents:2,
   comments:[{type:"info",text:"Benetas premium apartment-style — groups of 8 residents per apartment."},{type:"general",text:"Sweeping Port Phillip Bay & city views from elevated terraces."}]},
  {code:"RC",name:"Regis Cranbourne",suburb:"Junction Village VIC 3977",address:"18 Sherwood Rd",phone:"(03) 5996 7777",lat:-38.1348,lng:145.3321,beds:149,incidents:9,
   comments:[{type:"info",text:"149 beds near Cranbourne Botanical Gardens. Facility of the Year 2012."},{type:"general",text:"Large recreational spaces & cosy lounges. Bush garden walkways."}]},
  {code:"RF",name:"Regis Frankston",suburb:"Frankston VIC 3199",address:"93 Ashleigh Avenue",phone:"(03) 9789 6999",lat:-38.1505,lng:145.1295,beds:106,incidents:5,
   comments:[{type:"info",text:"106 beds. 100m from Frank Street Reserve, 5 min from Frankston Hospital."},{type:"general",text:"Outdoor chess, mini-golf, leafy courtyards. Dementia care available."}]},
  {code:"SC",name:"Somerville Gardens",suburb:"Somerville VIC 3912",address:"22 Graf Road",phone:"(03) 5977 9922",lat:-38.2253,lng:145.1768,beds:106,incidents:3,
   comments:[{type:"info",text:"Opal HealthCare. New wellness centre for reablement & restorative care."},{type:"general",text:"Koi pond gardens, theatrette, Steinway grand piano, happy hour bar."}]},
  {code:"XB",name:"Village Baxter",suburb:"Frankston South VIC 3199",address:"8 Robinsons Rd",phone:"(03) 5971 1349",lat:-38.1900,lng:145.1560,beds:64,incidents:1,
   comments:[{type:"info",text:"64-suite government accredited home co-located with retirement village."},{type:"general",text:"Serving Frankston & Mornington Peninsula community since 1986."}]}
];
/* ═══════════════════════════════════════════════════ */

function incClass(n){return n>=8?"hi":n>=5?"mid":""}
function valClass(n){return n>=8?"warn":n>=5?"caution":"ok"}

/* ── MAP ── */
const map = L.map('map',{zoomControl:false,tap:true,tapTolerance:15})
             .setView([-38.12,145.16],11);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
  maxZoom:19
}).addTo(map);

/* Legend */
const legend = L.control({position:'bottomright'});
legend.onAdd = function(){
  const d = L.DomUtil.create('div','map-legend');
  d.innerHTML=`<div class="leg-title">Map Legend</div>
    <div class="leg-row"><div class="leg-dot g"></div>Low incidents (0–4)</div>
    <div class="leg-row"><div class="leg-dot a"></div>Medium (5–7)</div>
    <div class="leg-row"><div class="leg-dot r"></div>High (8+)</div>
    <div class="leg-row"><div class="leg-dot v"></div>Live vehicle 🚗</div>`;
  return d;
};
legend.addTo(map);

/* ── FACILITY MARKERS ── */
const facList = document.getElementById('facList');
const rowEls  = [];
const markers = [];

facilities.forEach((f,i)=>{
  const row = document.createElement('div');
  row.className='fac-row';
  row.innerHTML=`
    <span class="code-pill">${f.code}</span>
    <div class="fac-info">
      <div class="fac-name">${f.name}</div>
      <div class="fac-addr">${f.address}, ${f.suburb}</div>
      <div class="fac-beds">🛏 ${f.beds} beds · ☎ ${f.phone}</div>
    </div>`;
  row.addEventListener('click',()=>{
    map.setView([f.lat,f.lng],15,{animate:true});
    markers[i].openPopup();
    setActive(i);
  });
  facList.appendChild(row);
  rowEls.push(row);

  const icon = L.divIcon({
    className:'',
    html:`<div class="cpin ${incClass(f.incidents)}">${f.code}</div>`,
    iconSize:[46,46],iconAnchor:[23,23],popupAnchor:[0,-28]
  });

  const notes = f.comments.map(c=>`<div class="pw-note ${c.type}">${c.text}</div>`).join('');

  const popupHTML = `
    <div class="pw-head">
      <span class="pw-code">${f.code}</span>
      <div>
        <div class="pw-name">${f.name}</div>
        <div class="pw-addr">📍 ${f.address}, ${f.suburb}</div>
        <div class="pw-phone">☎ ${f.phone}</div>
      </div>
    </div>
    <div class="pw-body">
      <div class="pw-stats">
        <div class="pw-stat">
          <div class="pw-stat-lbl">Total Beds</div>
          <div class="pw-stat-val ok">${f.beds}</div>
        </div>
        <div class="pw-stat">
          <div class="pw-stat-lbl">Incidents</div>
          <div class="pw-stat-val ${valClass(f.incidents)}">${f.incidents}</div>
        </div>
        <div class="pw-stat">
          <div class="pw-stat-lbl">Occupancy</div>
          <div class="pw-stat-val ok">—</div>
        </div>
      </div>
      <div class="pw-div"></div>
      <div class="pw-notes-lbl">Notes &amp; Special Requests</div>
      ${notes}
      <div class="pw-btn-row">
        <a class="pw-btn" href="${sheetLink(f.code)}" target="_blank" rel="noopener">
          <span class="pw-btn-icon">📊</span>
          View ${f.code} Incidents in Tracker
        </a>
      </div>
    </div>`;

  const marker = L.marker([f.lat,f.lng],{icon})
    .addTo(map)
    .bindPopup(popupHTML,{maxWidth:330,closeButton:true,autoClose:true});
  marker.on('click',()=>setActive(i));
  marker.on('popupclose',()=>rowEls[i].classList.remove('active'));
  markers.push(marker);
});

function setActive(i){
  rowEls.forEach(r=>r.classList.remove('active'));
  rowEls[i].classList.add('active');
  rowEls[i].scrollIntoView({block:'nearest',behavior:'smooth'});
}

/* ── SEARCH ── */
document.getElementById('searchBox').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  rowEls.forEach((row,i)=>{
    const f=facilities[i];
    row.classList.toggle('hidden',
      !f.code.toLowerCase().includes(q)&&
      !f.name.toLowerCase().includes(q)&&
      !f.suburb.toLowerCase().includes(q));
  });
});

/* ══════════════════════════════════════════════════════════
   FLEETLOG LIVE VEHICLE TRACKING
   Steps:
   1. Authenticate with Client ID + Secret → get access token
   2. Use token to fetch vehicle location
   3. Update marker on map every 10 seconds
   ══════════════════════════════════════════════════════════ */

let vehicleMarker = null;
let accessToken   = null;
let tokenExpiry   = 0;

const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const vPanel     = document.getElementById('vehiclePanel');
const vName      = document.getElementById('vName');
const vInfo      = document.getElementById('vInfo');
const vSpeed     = document.getElementById('vSpeed');

// Skip tracking if credentials not filled in yet
const credentialsReady =
  FLEETLOG_CLIENT_ID     !== "PASTE_YOUR_CLIENT_ID_HERE" &&
  FLEETLOG_CLIENT_SECRET !== "PASTE_YOUR_CLIENT_SECRET_HERE" &&
  FLEETLOG_VEHICLE_ID    !== "PASTE_YOUR_VEHICLE_ID_HERE";

if(!credentialsReady){
  statusText.textContent = "Vehicle: Not configured";
  console.warn("Fleetlog credentials not set — add them to the CREDENTIALS section.");
} else {
  startTracking();
}

async function getAccessToken(){
  // Only fetch a new token if expired
  if(accessToken && Date.now() < tokenExpiry) return accessToken;
  try {
    const res = await fetch(`${FLEETLOG_API_BASE}/oauth/token`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        client_id:     FLEETLOG_CLIENT_ID,
        client_secret: FLEETLOG_CLIENT_SECRET,
        grant_type:    "client_credentials"
      })
    });
    if(!res.ok) throw new Error("Auth failed: " + res.status);
    const data = await res.json();
    accessToken = data.access_token;
    // Token valid for returned seconds minus 60s buffer
    tokenExpiry = Date.now() + ((data.expires_in || 3600) - 60) * 1000;
    return accessToken;
  } catch(e){
    console.error("Fleetlog auth error:", e);
    return null;
  }
}

async function fetchVehicleLocation(){
  const token = await getAccessToken();
  if(!token){
    setStatus("error","Auth failed");
    return;
  }
  try {
    const res = await fetch(`${FLEETLOG_API_BASE}/vehicles/${FLEETLOG_VEHICLE_ID}/location`, {
      headers: {"Authorization": "Bearer " + token}
    });
    if(!res.ok) throw new Error("Location fetch failed: " + res.status);
    const data = await res.json();

    // ── Adjust field names below if Fleetlog uses different keys ──
    const lat   = data.lat   ?? data.latitude  ?? data.position?.lat;
    const lng   = data.lng   ?? data.longitude ?? data.position?.lng ?? data.position?.lon;
    const speed = data.speed ?? data.speed_kmh ?? null;
    const name  = data.name  ?? data.vehicle_name ?? "Your Vehicle";
    // ──────────────────────────────────────────────────────────────

    if(lat == null || lng == null) throw new Error("No lat/lng in response");

    updateVehicleMarker(lat, lng, name, speed);
    setStatus("live", `${name} · Live`);

  } catch(e){
    console.error("Fleetlog location error:", e);
    setStatus("error","Location error");
  }
}

function updateVehicleMarker(lat, lng, name, speed){
  const vehicleIcon = L.divIcon({
    className:'',
    html:'<div class="vpin">🚗</div>',
    iconSize:[40,40],iconAnchor:[20,20],popupAnchor:[0,-25]
  });

  const speedText = speed != null ? `${Math.round(speed)} km/h` : "";
  const popupHTML = `
    <div style="font-family:-apple-system,sans-serif;padding:12px 16px;min-width:180px">
      <div style="font-weight:700;font-size:0.9rem;color:#0d2137">🚗 ${name}</div>
      <div style="font-size:0.72rem;color:#6b7c93;margin-top:4px">
        📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}
      </div>
      ${speedText ? `<div style="font-size:0.72rem;color:#1a8c7a;margin-top:3px">⚡ ${speedText}</div>` : ''}
      <div style="font-size:0.68rem;color:#aaa;margin-top:4px">Updated: ${new Date().toLocaleTimeString()}</div>
    </div>`;

  if(vehicleMarker){
    vehicleMarker.setLatLng([lat,lng]);
    vehicleMarker.getPopup().setContent(popupHTML);
  } else {
    vehicleMarker = L.marker([lat,lng],{icon:vehicleIcon,zIndexOffset:1000})
      .addTo(map)
      .bindPopup(popupHTML,{maxWidth:220,closeButton:false});
  }

  // Update sidebar vehicle panel
  vPanel.style.display = 'block';
  vName.textContent  = name;
  vInfo.textContent  = `📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  vSpeed.textContent = speedText ? `⚡ ${speedText}` : '';
}

function setStatus(type, text){
  statusDot.className = 'status-dot ' + (type === 'live' ? 'live' : type === 'error' ? 'error' : '');
  statusText.textContent = 'Vehicle: ' + text;
}

function startTracking(){
  fetchVehicleLocation(); // First call immediately
  setInterval(fetchVehicleLocation, REFRESH_INTERVAL); // Then every 10s
}
</script>
